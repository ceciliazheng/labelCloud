name: Unit Tests
on: [push, pull_request]

jobs:

  testing:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]  # macos-latest has OpenGL import error
        python-version: ["3.9", "3.10", "3.11", "3.12"]

    steps:
    - name: Get repository
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Qt system dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libgl1-mesa-dev libxkbcommon-x11-0

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        python -m pip install -r requirements.txt

    - name: Check black formatting
      run: python -m black --check .

    - name: Lint with mypy
      if: ${{ matrix.python-version == '3.9' }}  # only lint last Python version
      run: |
        mypy labelCloud/.

    - name: Test with pytest
      env:
        PYTEST_QT_API: pyside6
        QT_QPA_PLATFORM: offscreen
      run: |
        python -m pytest labelCloud/tests/unit/
